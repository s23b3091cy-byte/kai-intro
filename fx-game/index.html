<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Trading Simulator</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #151b29;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --color-buy: #10b981; /* Emerald */
            --color-sell: #ef4444; /* Red */
            --color-close: #3b82f6; /* Blue */
            --border-color: #1e293b;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        /* Header */
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, rgba(21,27,41,1) 0%, rgba(11,15,25,1) 100%);
        }

        h1 {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .price-display {
            font-size: 42px;
            font-weight: 700;
            font-family: monospace;
            transition: color 0.2s;
        }

        .price-display.up { color: var(--color-buy); text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .price-display.down { color: var(--color-sell); text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }

        .time-left {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Chart */
        .chart-container {
            flex-grow: 1;
            position: relative;
            background-color: var(--bg-color);
            width: 100%;
            padding: 10px 0;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background-color: var(--border-color);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .stat-box {
            background-color: var(--panel-bg);
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            font-family: monospace;
        }

        .value-up { color: var(--color-buy); }
        .value-down { color: var(--color-sell); }

        /* Controls */
        .controls {
            padding: 20px;
            display: flex;
            gap: 10px;
            background-color: var(--panel-bg);
        }

        .btn {
            flex: 1;
            padding: 15px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s, filter 0.2s;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .btn-buy { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-sell { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn-close { background: linear-gradient(135deg, #3b82f6, #2563eb); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }

        .btn-buy:hover:not(:disabled) { filter: brightness(1.1); }
        .btn-sell:hover:not(:disabled) { filter: brightness(1.1); }
        .btn-close:hover:not(:disabled) { filter: brightness(1.1); }

        /* Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 15, 25, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.3s;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-content {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .overlay-content h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .overlay-content p {
            font-size: 18px;
            margin-bottom: 30px;
            color: var(--text-muted);
        }

        .overlay-content span {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-main);
        }

        #btn-restart {
            width: 100%;
        }

        @media (min-width: 501px) {
            .app-container {
                height: 90vh;
                border-radius: 30px;
                box-shadow: 0 30px 60px rgba(0,0,0,0.6);
                overflow: hidden;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>USD/JPY <span>SIMULATOR</span></h1>
        <div class="price-display" id="price-display">
            <span style="font-size: 24px; color: var(--text-muted);">¥</span><span id="current-price">150.000</span>
        </div>
        <div class="time-left">Tick: <span id="tick-count" style="color:var(--text-main); font-weight:bold;">0</span> / 100</div>
    </header>

    <div class="chart-container" id="chart-container">
        <canvas id="chart-canvas"></canvas>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">所持金</div>
            <div class="stat-value" id="balance">100,000</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">含み損益</div>
            <div class="stat-value" id="unrealized-pnl">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">累計利益</div>
            <div class="stat-value" id="total-profit">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">ポジション</div>
            <div class="stat-value" id="position-type" style="color:var(--text-muted)">NONE</div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-buy" class="btn btn-buy">BUY</button>
        <button id="btn-sell" class="btn btn-sell">SELL</button>
        <button id="btn-close" class="btn btn-close" disabled>CLOSE</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <div class="overlay-content">
            <h2>Game Over</h2>
            <p>最終資金<br><span id="final-balance"></span> 円</p>
            <button id="btn-restart" class="btn btn-close">RESTART</button>
        </div>
    </div>
</div>

<script>
    // Constants
    const INITIAL_PRICE = 150.000;
    const INITIAL_BALANCE = 100000;
    const MAX_TICKS = 100;
    const CHART_HISTORY_LIMIT = 40;
    const LOT_SIZE = 10000; // 1 pip (0.01) movement = 100 JPY
    
    // State
    let currentPrice = INITIAL_PRICE;
    let balance = INITIAL_BALANCE;
    let totalProfit = 0;
    let unrealizedPnl = 0;
    let position = null; // { type: 'BUY'|'SELL', entryPrice: number }
    let tickCount = 0;
    let priceHistory = [];
    let gameInterval;

    // DOM Elements
    const elPriceDisplay = document.getElementById('price-display');
    const elCurrentPrice = document.getElementById('current-price');
    const elTickCount = document.getElementById('tick-count');
    const elBalance = document.getElementById('balance');
    const elUnrealizedPnl = document.getElementById('unrealized-pnl');
    const elTotalProfit = document.getElementById('total-profit');
    const elPositionType = document.getElementById('position-type');
    
    const btnBuy = document.getElementById('btn-buy');
    const btnSell = document.getElementById('btn-sell');
    const btnClose = document.getElementById('btn-close');
    
    const overlay = document.getElementById('game-over');
    const elFinalBalance = document.getElementById('final-balance');
    const btnRestart = document.getElementById('btn-restart');

    const canvas = document.getElementById('chart-canvas');
    const ctx = canvas.getContext('2d');

    // Setup Canvas
    function resizeCanvas() {
        const container = document.getElementById('chart-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        drawChart();
    }
    window.addEventListener('resize', resizeCanvas);

    // Number formatter
    const formatJPY = (num) => {
        return new Intl.NumberFormat('ja-JP').format(Math.floor(num));
    };

    // Initialize Game
    function initGame() {
        currentPrice = INITIAL_PRICE;
        balance = INITIAL_BALANCE;
        totalProfit = 0;
        unrealizedPnl = 0;
        position = null;
        tickCount = 0;
        priceHistory = Array(CHART_HISTORY_LIMIT).fill(currentPrice); // fill with flat line initially
        
        updateUI();
        resizeCanvas();
        overlay.classList.add('hidden');
        
        btnBuy.disabled = false;
        btnSell.disabled = false;
        btnClose.disabled = true;

        if(gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(gameTick, 1000);
    }

    // Game Loop
    function gameTick() {
        if (tickCount >= MAX_TICKS) {
            endGame();
            return;
        }

        tickCount++;
        
        // Random price movement (-0.050 to +0.050)
        const change = (Math.random() - 0.5) * 0.1;
        const newPrice = currentPrice + change;
        
        // Visual flash effect
        elPriceDisplay.classList.remove('up', 'down');
        void elPriceDisplay.offsetWidth; // trigger reflow
        if (newPrice > currentPrice) {
            elPriceDisplay.classList.add('up');
        } else if (newPrice < currentPrice) {
            elPriceDisplay.classList.add('down');
        }

        currentPrice = newPrice;

        // Update History
        priceHistory.push(currentPrice);
        if (priceHistory.length > CHART_HISTORY_LIMIT) {
            priceHistory.shift();
        }

        // Calculate Unrealized PnL
        if (position) {
            const priceDiff = currentPrice - position.entryPrice;
            if (position.type === 'BUY') {
                unrealizedPnl = priceDiff * LOT_SIZE;
            } else {
                unrealizedPnl = -priceDiff * LOT_SIZE;
            }
        } else {
            unrealizedPnl = 0;
        }

        updateUI();
        drawChart();
    }

    // End Game
    function endGame() {
        clearInterval(gameInterval);
        
        // Force close position if open
        if (position) {
            closePosition();
        }

        elFinalBalance.textContent = formatJPY(balance);
        overlay.classList.remove('hidden');
    }

    // Trading Actions
    btnBuy.addEventListener('click', () => openPosition('BUY'));
    btnSell.addEventListener('click', () => openPosition('SELL'));
    btnClose.addEventListener('click', closePosition);
    btnRestart.addEventListener('click', initGame);

    function openPosition(type) {
        if (position) return; // Prevent multiple positions
        
        position = {
            type: type,
            entryPrice: currentPrice
        };
        
        btnBuy.disabled = true;
        btnSell.disabled = true;
        btnClose.disabled = false;
        
        updateUI();
        drawChart();
    }

    function closePosition() {
        if (!position) return;

        balance += unrealizedPnl;
        totalProfit += unrealizedPnl;
        
        position = null;
        unrealizedPnl = 0;
        
        btnBuy.disabled = false;
        btnSell.disabled = false;
        btnClose.disabled = true;
        
        updateUI();
        drawChart();
    }

    // Update UI Elements
    function updateUI() {
        elCurrentPrice.textContent = currentPrice.toFixed(3);
        elTickCount.textContent = tickCount;
        
        elBalance.textContent = formatJPY(balance);
        
        elUnrealizedPnl.textContent = formatJPY(unrealizedPnl);
        elUnrealizedPnl.className = 'stat-value';
        if (unrealizedPnl > 0) elUnrealizedPnl.classList.add('value-up');
        if (unrealizedPnl < 0) elUnrealizedPnl.classList.add('value-down');
        
        elTotalProfit.textContent = formatJPY(totalProfit);
        elTotalProfit.className = 'stat-value';
        if (totalProfit > 0) elTotalProfit.classList.add('value-up');
        if (totalProfit < 0) elTotalProfit.classList.add('value-down');
        
        if (position) {
            elPositionType.textContent = position.type;
            elPositionType.className = 'stat-value';
            elPositionType.classList.add(position.type === 'BUY' ? 'value-up' : 'value-down');
        } else {
            elPositionType.textContent = 'NONE';
            elPositionType.className = 'stat-value';
            elPositionType.style.color = 'var(--text-muted)';
        }
    }

    // Chart Drawing Logic
    function drawChart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const minPrice = Math.min(...priceHistory) - 0.02;
        const maxPrice = Math.max(...priceHistory) + 0.02;
        const range = maxPrice - minPrice;
        
        const stepX = canvas.width / (CHART_HISTORY_LIMIT - 1);
        
        // Draw Grid
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i = 1; i <= 4; i++) {
            const y = (canvas.height / 4) * i;
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
        }
        ctx.stroke();

        // Draw Line
        ctx.beginPath();
        ctx.lineWidth = 3;
        
        // Create Gradient
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, 'rgba(59, 130, 246, 1)'); // Blue top
        gradient.addColorStop(1, 'rgba(16, 185, 129, 1)'); // Green bottom
        ctx.strokeStyle = gradient;

        priceHistory.forEach((price, index) => {
            const x = index * stepX;
            const y = canvas.height - ((price - minPrice) / range) * canvas.height;
            if (index === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        
        ctx.stroke();
        
        // Fill area under line
        ctx.lineTo(canvas.width, canvas.height);
        ctx.lineTo(0, canvas.height);
        const fillGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        fillGradient.addColorStop(0, 'rgba(59, 130, 246, 0.2)');
        fillGradient.addColorStop(1, 'rgba(59, 130, 246, 0)');
        ctx.fillStyle = fillGradient;
        ctx.fill();

        // Draw Position Entry Line
        if (position) {
            const y = canvas.height - ((position.entryPrice - minPrice) / range) * canvas.height;
            ctx.beginPath();
            ctx.strokeStyle = position.type === 'BUY' ? '#10b981' : '#ef4444';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
            ctx.setLineDash([]); // reset
        }
    }

    // Start
    initGame();
</script>

</body>
</html>
